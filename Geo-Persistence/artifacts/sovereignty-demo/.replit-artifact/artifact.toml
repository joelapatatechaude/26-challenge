kind = "web"
previewPath = "/sovereignty-demo/"
title = "Red Hat Sovereignty Field Enablement — Demo"
version = "1.0.0"
id = "artifacts/sovereignty-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/sovereignty-demo/" ]
localPort = 22984

[services.development]
run = "pnpm --filter @workspace/sovereignty-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sovereignty-demo", "run", "build" ]
publicDir = "artifacts/sovereignty-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22984"
BASE_PATH = "/sovereignty-demo/"
